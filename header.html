<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    <style>
        /* ========================================================
           FASHION THEME DEFINITION
           Primary Body: Royal Deep Purple (#3b174e)
           Accent Highlights: Metallic Gold (#d4af37)
           Text/Base Contrast: Luxury Soft Cream (#f5f0e1)
        ======================================================== */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Playfair Display', serif;
            width: 100%;
            overflow-x: hidden;
        }

        /* MASTER HEADER WRAPPER */
        .site-header {
            width: 100%;
            background-color: #3b174e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1000;
            border-bottom: 3px solid #d4af37;
        }

        /* 1. TOP UTILITY BAR (Desktop Only) */
        .header-top-bar {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2); /* Slightly darker tint */
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 8px 20px;
        }

        .top-bar-content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .top-bar-links a {
            color: #bfa3ce; /* Muted lilac-cream */
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .top-bar-links a:hover {
            color: #d4af37;
        }

        /* Social Badges Styling */
        .social-badge-fb { color: #4267B2 !important; font-weight: bold; }
        .social-badge-wa { color: #25D366 !important; font-weight: bold; }

        /* 2. MAIN NAVIGATION BAR */
        .header-main-bar {
            width: 100%;
            padding: 15px 20px;
        }

        .main-bar-content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* BRAND LOGO */
        .brand-logo-container {
            flex: 0 0 auto;
        }

        .brand-logo-img {
            max-height: 55px;
            display: block;
            width: auto;
        }

        /* CORE NAVIGATION ENGINE */
        .main-nav {
            display: flex;
            align-items: center;
        }

        .nav-list {
            list-style: none;
            display: flex;
            gap: 18px;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        .nav-list a {
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #f5f0e1;
            padding: 8px 4px;
            display: block;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-list a:hover {
            color: #d4af37;
        }

        /* Luxury underline hover transition */
        .nav-list a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background-color: #d4af37;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }

        .nav-list a:hover::after {
            width: 90%;
        }

        /* PREMIUM CALL-TO-ACTION BUTTON (Bootcamp) */
        .cta-bootcamp-btn a {
            background-color: #d4af37;
            color: #3b174e !important;
            padding: 10px 16px;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .cta-bootcamp-btn a::after {
            display: none !important; /* Remove line under button */
        }

        .cta-bootcamp-btn a:hover {
            background-color: #f5f0e1;
            color: #3b174e;
            transform: scale(1.05);
        }

        /* 3. MOBILE ENGINE (Hamburger Framework) */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .mobile-menu-toggle span {
            display: block;
            width: 26px;
            height: 3px;
            background-color: #d4af37;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        /* RESPONSIVE BREAKPOINT RULES (Ensures 100% boundary safety) */
        @media (max-width: 992px) {
            .header-top-bar {
                display: none; /* Push top bar items into mobile dropdown list */
            }

            .mobile-menu-toggle {
                display: block;
            }

            .main-nav {
                display: none; /* Hide standard structural row layout */
                width: 100%;
                position: absolute;
                top: 100%;
                left: 0;
                background-color: #3b174e;
                border-top: 2px solid #d4af37;
                padding: 15px 0;
                box-shadow: 0 10px 15px rgba(0,0,0,0.4);
            }

            .main-nav.active {
                display: flex;
            }

            .nav-list {
                flex-direction: column;
                width: 100%;
                gap: 0;
            }

            .nav-list li {
                width: 100%;
                text-align: center;
            }

            .nav-list a {
                padding: 14px;
                border-bottom: 1px solid rgba(212, 175, 55, 0.15);
                font-size: 15px;
            }

            .nav-list a::after {
                display: none;
            }

            .cta-bootcamp-btn a {
                border-radius: 0;
                background-color: #d4af37;
                color: #3b174e !important;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="site-header">
        
        <div class="header-top-bar">
            <div class="top-bar-content">
                <ul class="top-bar-links">
                    <li><a href="mission.html">Our Mission</a></li>
                    <li><a href="offices.html">Our Offices</a></li>
                </ul>
                <ul class="top-bar-links">
                    <li><a href="https://www.facebook.com/BNTCCOUTURE/" class="social-badge-fb" target="_blank">👍 Follow Our Facebook</a></li>
                    <li><a href="https://wa.me/2348060838387" class="social-badge-wa" target="_blank">💬 WhatsApp Us</a></li>
                </ul>
            </div>
        </div>

        <div class="header-main-bar">
            <div class="main-bar-content">
                
                <div class="brand-logo-container">
                    <a href="index.html">
                        <img src="https://i.postimg.cc/hGKcP7GM/eprel-fashion.jpg" alt="" class="brand-logo-img"> <b style="font-size:25px;color:white;font-family:Embassy BT;">EPREL Fashion</b>
                                                                                    
                    </a>
                </div>

                <nav class="main-nav" id="main-nav">
                    <ul class="nav-list"> 
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="what-we-do.html">What We Do</a></li>
                        <li><a href="ceo.html">CEO</a></li>
                        <li><a href="delivery.html">How We Deliver</a></li>
                        <li><a href="order.html">Place Orders</a></li>
                        
                        <li class="mobile-only-link" style="display:none;"><a href="mission.html">Our Mission</a></li>
                        <li class="mobile-only-link" style="display:none;"><a href="offices.html">Our Offices</a></li>
                        <li class="mobile-only-link" style="display:none;"><a href="https://www.facebook.com/BNTCCOUTURE/">Facebook Page</a></li>
                        <li class="mobile-only-link" style="display:none;"><a href="https://wa.me/2348060838387">Contact WhatsApp</a></li>
                        
                        <li class="cta-bootcamp-btn"><a href="https://chat.whatsapp.com/LPRaFK3dfdZBpg6tCoGuMT">Join Our Bootcamp!</a></li>
                    </ul>
                </nav>

                <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle Navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

            </div>
        </div>
    </header>

    <script>
        const mobileToggle = document.getElementById('mobile-menu-toggle');
        const mainNav = document.getElementById('main-nav');
        const mobileLinks = document.querySelectorAll('.mobile-only-link');

        // Dynamic responsive script checking to show Top Bar hidden elements safely on mobile devices
        function checkResponsiveLayout() {
            if (window.innerWidth <= 992) {
                mobileLinks.forEach(link => link.style.display = "block");
            } else {
                mobileLinks.forEach(link => link.style.display = "none");
                mainNav.classList.remove('active');
            }
        }

        mobileToggle.addEventListener('click', () => {
            mainNav.classList.toggle('active');
        });

        window.addEventListener('resize', checkResponsiveLayout);
        window.addEventListener('load', checkResponsiveLayout);
    </script>

</body>
</html>
